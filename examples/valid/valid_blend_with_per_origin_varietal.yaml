# Valid example: blend where each origin carries its own process and varietal.
# Demonstrates coffee.name at coffee level and per-origin process and varietal —
# the correct v0.6 model for blends.
brewspec_version: "0.8"
brews:
  - date: "2026-03-02"
    type: "pour_over"
    dose_g: 20.0
    water_weight_g: 300.0
    brew_ratio: 15.0
    method: "Hario V60"
    grind: "medium_fine"
    water_temp_c: 94
    coffee:
      name: "House Blend"
      type: "blend"
      origins:
        - name: "Ethiopia Natural"
          country: "Ethiopia"
          region: "Yirgacheffe"
          process: "Washed"
          varietal: "Heirloom"
        - name: "Colombia Natural"
          country: "Colombia"
          region: "Huila"
          producer: "El Paraiso"
          process: "Natural"
          varietal: "Gesha"
    result:
      ratings:
        overall: 4
        flavour: 4
