# brew.water_g   = recipe target water input (what you intend to put in)
# brew.yield_g   = recipe target output weight (what you intend to collect)
# brew.duration_s = recipe target extraction time
# result.dose_g   = actual dose weighed out (may differ from target)
# result.water_g  = actual water used (may differ from target)
