# Reviewer report template
#
# Used by the reviewer agent when producing a review artifact.
# File naming: reviews/YYYY-MM-DD-reviewer-[task-id].yaml
#
# Verdict values: PASS | FAIL
# Status values per AC: PASS | FAIL | SKIP (with reason)
# Severity levels: Critical | High | Medium | Low

result:
  date: "YYYY-MM-DD"
  agent: reviewer
  task: "[task name, e.g. BrewSpec v0.4 review]"
  input_summary: >
    [One paragraph describing what was reviewed: which spec, which ACs,
    which repos/files were examined.]

  verdict: PASS  # or FAIL

  # --------------------------------------------------------------------------
  # Test and lint results — run before evaluating spec compliance
  # --------------------------------------------------------------------------
  test_results:
    schema_tests: 0         # number of schema tests run (omit if not applicable)
    cli_tests: 0            # number of CLI/brewlog tests run (omit if not applicable)
    total: 0
    status: all_passed      # all_passed | failures (list failures below if any)
    failures: []            # list failing test names/descriptions if status != all_passed

  lint_results:
    tool: ruff
    errors: 0
    status: clean           # clean | errors (list below if any)
    errors_detail: []       # list ruff error messages if status != clean

  # --------------------------------------------------------------------------
  # Spec compliance — one entry per acceptance criterion
  # --------------------------------------------------------------------------
  spec_compliance:
    # Format: AC-N: { status: PASS|FAIL, note: "..." }
    # Note should be specific: what was checked, what was found.
    # On FAIL, describe exactly what is missing or wrong.
    AC-1:  { status: PASS, note: "" }
    # AC-2:  { status: FAIL, note: "Field X is missing from the schema." }

  # --------------------------------------------------------------------------
  # Critical / High issues — must fix before PASS verdict
  # --------------------------------------------------------------------------
  # Omit this section (or set to []) if no critical/high issues.
  critical_issues:
    - id: CRIT-1
      severity: Critical   # Critical | High
      ac_refs: []          # list of AC-N strings this issue blocks
      file: ""             # absolute path to affected file
      description: >
        [What is wrong. Be specific: what is missing, what is incorrect,
        what the spec requires vs what was found.]
      fix: >
        [Numbered steps the dev should follow to resolve this issue.]

  # --------------------------------------------------------------------------
  # Security findings — required section, even if all pass
  # --------------------------------------------------------------------------
  security:
    input_validation: "PASS — [brief description of what was checked]"
    sql_injection: "PASS — [brief description]"
    file_io: "PASS — [brief description]"
    no_dangerous_functions: "PASS — [brief description]"
    error_messages: "PASS — [brief description]"
    # Add additional categories as relevant to the task:
    # additional_properties: "PASS — ..."
    # string_limits: "PASS — ..."
    # path_handling: "PASS — ..."

  # --------------------------------------------------------------------------
  # Medium / Low issues — non-blocking; recorded as carry_forward on next task
  # --------------------------------------------------------------------------
  # Omit this section (or set to []) if no medium/low issues.
  medium_issues:
    - id: MED-1
      severity: Medium   # Medium | Low
      file: ""
      description: >
        [What could be improved. Non-blocking — do not fail the build for these.]
      suggestion: >
        [Optional: suggested fix or approach.]

  # --------------------------------------------------------------------------
  # TDD compliance
  # --------------------------------------------------------------------------
  tdd_compliance:
    tests_written_first: true   # true | false | unknown
    all_acs_have_tests: true    # true | false
    meaningful_assertions: true # true | false
    notes: ""                   # any relevant observations

  # --------------------------------------------------------------------------
  # Summary and carry-forward
  # --------------------------------------------------------------------------
  summary: >
    [One paragraph overall assessment. State the verdict, key findings,
    and what must happen next (fix and re-review, or proceed to deploy).]

  # Non-blocking items to carry forward to the next version's backlog task.
  # These are recorded in manifest.yaml on the NEXT task, not this one.
  carry_forward:
    - "[Description of non-blocking item for next version]"
