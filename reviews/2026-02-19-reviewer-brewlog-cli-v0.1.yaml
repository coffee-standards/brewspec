  # ---------------------------------------------------------------------------
  # Design compliance
  # ---------------------------------------------------------------------------
  design_compliance:
    package_structure:
      status: PASS
      notes: >
        All files present per design: src/brewlog/__init__.py, cli.py, models.py,
        db.py, schema.py, serialise.py, commands/__init__.py, add.py, list_.py,
        show.py, export.py, import_.py. pyproject.toml matches design spec including
        package-data entry for brewspec.schema.json.

    pydantic_models:
      status: PASS
      notes: >
        BrewInput, CoffeeInput, WaterInput match design Section 2 exactly. All
        field validators implemented: DATE_PATTERN, BREW_TYPE_ENUM, COFFEE_TYPE_ENUM,
        ROAST_DATE_PATTERN, range checks for numerics, minLength-1 for freeform text.

    sqlite_schema:
      status: PASS
      notes: >
        DDL in db.py matches design Section 3.2 exactly. 19 columns including id
        INTEGER PRIMARY KEY AUTOINCREMENT, coffee_origin TEXT (JSON-encoded),
        idx_brews_date index created. CREATE IF NOT EXISTS used for idempotency.

    parameterised_queries:
      status: PASS
      notes: >
        All 4 SQL-executing functions (insert_brew, insert_brew_dict, get_brew,
        list_brews) use ? placeholders exclusively. No f-strings or .format() calls
        reach SQL strings. _init_schema uses executescript with a hardcoded constant.

    schema_bundling:
      status: PASS
      notes: >
        brewspec.schema.json present at src/brewlog/brewspec.schema.json.
        pyproject.toml [tool.setuptools.package-data] brewlog = ["brewspec.schema.json"].
        schema.py uses importlib.resources.files() for resolution.

    export_import_serialisation:
      status: PASS
      notes: >
        serialise.py row_to_brew_dict omits NULL columns, deserialises JSON origin,
        conditionally includes coffee/water sub-objects. Import uses transaction
        (BEGIN/commit/rollback pattern) for all-or-nothing insert.

    cli_interface:
      status: PASS
      notes: >
        All commands registered on cli group. list command registered as name="list",
        import command as name="import" (avoiding Python keyword collision). Connection
        management pattern (try/finally conn.close()) used in all commands.

  # ---------------------------------------------------------------------------
  # Security review
  # ---------------------------------------------------------------------------
  security:

    sql_injection:
      status: PASS
      finding: none
      detail: >
        All 4 SQL-executing functions use ? parameterised placeholders.
        test_parameterised_query_safety PASSED (SQL injection string stored as
        plain text, table not dropped).

    yaml_safe_load:
      status: PASS
      finding: none
      detail: >
        import_.py line 47 uses yaml.safe_load() exclusively. No yaml.load() calls
        anywhere in src/ — confirmed by grep. The one match is in a comment.
        test_import_uses_safe_load PASSED with Python object constructor tag.

    path_traversal_export:
      status: PASS
      finding: none
      detail: >
        validate_export_path checks ".." in p.parts before any file I/O.
        Called before DB access in export.py. Tests confirm exit 1 for ../evil.yaml
        and foo/../bar.yaml.

    path_traversal_import:
      status: PASS
      finding: none
      detail: >
        validate_import_path checks ".." in p.parts, file existence, and 10MB size
        limit before reading file content. Called at import_.py line 27.

    file_size_limit:
      status: PASS
      finding: none
      detail: >
        serialise.py line 127: p.stat().st_size > 10 * 1024 * 1024. File size check
        occurs before read_text(). test_import_file_too_large PASSED.

    no_network_calls:
      status: PASS
      finding: none
      detail: >
        No HTTP client imports anywhere in src/. Schema loaded via importlib.resources.
        $id in brewspec.schema.json is metadata only — Draft202012Validator does not
        fetch remote refs. No urllib, requests, httpx, or socket usage.

    no_secrets_in_code:
      status: PASS
      finding: none
      detail: >
        No API keys, tokens, or credentials in source or test fixtures. Only hardcoded
        path is ~/.brewlog/brews.db, explicitly documented as non-sensitive in the spec.

    freeform_text_safety:
      status: PASS
      finding: none
      detail: >
        Freeform fields (method, grind, notes, varietal, process) passed via ?
        placeholders in SQL. Displayed via click.echo() — display only, not execution.
        No eval(), exec(), subprocess, or shell command construction anywhere in src/.

  # ---------------------------------------------------------------------------
  # TDD compliance
  # ---------------------------------------------------------------------------
  tdd_compliance:
    status: PASS
    notes: >
      151 tests across 11 test files. Every AC (2-36; AC-1 is install-time and
      documented as manual) has at least one corresponding test. Tests use tmp_path
      and monkeypatch for DB isolation — no shared state between tests. Tests cover
      both happy paths and error cases. Test names follow test_<what>_<condition>
      convention. No test asserts only True; all assertions are meaningful.
    coverage_gaps: none

  # ---------------------------------------------------------------------------
  # Quality observations
  # ---------------------------------------------------------------------------
  quality_observations:
    - id: Q1
      severity: Low
      description: >
        show.py line 36: the "No brew found with ID N." message is emitted via
        click.echo() (stdout) rather than click.echo(..., err=True) (stderr). Exit
        code is correctly 1. This is a minor stylistic inconsistency — error messages
        conventionally go to stderr. Not a spec violation (AC-19 specifies message
        and non-zero exit, not the output stream). Candidate for v0.2 cleanup.
      file: "/Users/scottluengen/Documents/1_Projects/coffee-brew-app/src/brewlog/commands/show.py"
      line: 36

    - id: Q2
      severity: Low
      description: >
        The design noted pyproject.toml build-backend should be
        "setuptools.backends.legacy:build" but the implementation uses
        "setuptools.build_meta" (the modern equivalent). Both are correct; the
        modern form is the preferred spelling and the package builds correctly.
        No functional issue.
      file: "/Users/scottluengen/Documents/1_Projects/coffee-brew-app/pyproject.toml"
      line: 3

    - id: Q3
      severity: Low
      description: >
        test_cmd_welcome.py::test_no_args_shows_ascii_cup asserts on generic characters
        ("(" or "." or "_") rather than the specific cup art string. The test passes but
        would also pass if the cup were removed and replaced with any text containing those
        characters. A stronger assertion would check for a unique substring from the cup,
        e.g., ".______." or "( (". This is a test quality concern only — the cup is
        present and correct in the implementation.
      file: "/Users/scottluengen/Documents/1_Projects/coffee-brew-app/tests/test_cmd_welcome.py"
      line: 28

    - id: Q4
      severity: Low
      description: >
        The export command's success message "Exported N brews to 'path'." is not
        required by the spec (AC-21 specifies only that the file is written and passes
        schema validation). This is a positive addition that improves UX — mentioning
        it as an observation, not a concern.
      file: "/Users/scottluengen/Documents/1_Projects/coffee-brew-app/src/brewlog/commands/export.py"
      line: 85

  # ---------------------------------------------------------------------------
  # Blocking issues
  # ---------------------------------------------------------------------------
  blocking_issues: none

  # ---------------------------------------------------------------------------
  # Self-review scorecard
  # ---------------------------------------------------------------------------
  self_review:
    agent: reviewer
    task: "BrewLog CLI v0.1 review"
    scores:
      input_adherence: 3      # Every AC-1 through AC-36 addressed with evidence
      format_compliance: 3    # All 7 Report Format sections present and populated
      scope_discipline: 3     # No findings outside spec or security scope
      spec_traceability: 3    # Every finding traces to a specific AC or security requirement
      convention_compliance: 3  # Checked principles.md, CLAUDE.md, tech stack compliance
      security: 3             # All 8 security checklist items evaluated with evidence
    weighted_score: 1.0
    passed: true
    notes: >
      Weighted calculation: (3*3 + 3*2 + 3*2 + 3*2 + 3*1 + 3*2) / (3*3 + 3*2 + 3*2 + 3*2 + 3*1 + 3*2)
      = 36/36 = 1.0. Reviewer dimensions applied: input_adherence (x3), format_compliance (x2),
      scope_discipline (x2), spec_traceability (x2), convention_compliance (x1), security (x2).
      Downstream_handoff, testability, and tdd_compliance dimensions do not apply to reviewer role.
