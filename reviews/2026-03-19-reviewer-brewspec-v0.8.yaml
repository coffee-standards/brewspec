notes: |
  BrewSpec v0.8 implementation is complete and correct. All 29 acceptance criteria are satisfied.

  Schema correctness: brewspec_version const is "0.8", title is "BrewSpec v0.8". coffee.roaster (string, minLength 1, maxLength 100), coffee.roast_level (enum ["light", "medium", "dark"]), origin.elevation_masl (integer, exclusiveMinimum 0), and water_temp_c multipleOf 0.1 are all correctly defined. additionalProperties: false is enforced on coffee, origin, and all other objects.

  Test coverage: 222 tests, all passing. Comprehensive coverage of all new fields with positive and negative cases. Decimal parsing is correctly implemented via _to_decimal() helper and schema fixture uses parse_float=decimal.Decimal. IEEE 754 edge cases (96.1, 93.3, 0.1, 99.9) are explicitly tested.

  Spec document: brewspec-v0.8.md contains complete field reference, What Changed section with additive/breaking separation, Backward Compatibility section with migration steps, and floating-point implementer note in the Validation section.

  Security: No injection risks. All new fields are schema-validated (bounded string, closed enum, positive integer). yaml.safe_load used for YAML parsing. No secrets or PII in examples. Roaster names are well-known specialty coffee companies.

  TDD compliance: Test file is well-organized by AC with clear docstrings referencing specific ACs. Helpers (_to_decimal, _load_yaml_example, _load_example_file) follow the design doc's recommended approach.

  One non-blocking issue: examples/invalid/invalid_type_enum.yaml was not bumped from v0.2 to v0.8. It still fails validation (version mismatch causes rejection), so no test breakage, but it is no longer testing its intended failure (bad type enum). Recommend carrying forward as a minor fix.

  Lint: ruff check passes clean.
