deviations_from_design:
  - id: mix_stderr_removal
    description: >
      The architect's design specified CliRunner(mix_stderr=False) for test isolation.
      Click 8.3 (installed in .venv) removed the mix_stderr parameter from CliRunner.
      All CliRunner instantiations updated to CliRunner() without the parameter.
      This does not affect test correctness — stderr output in Click 8.3 is accessible
      via result.output (mixed) or through the CliRunner's exception handling.
    impact: none

  - id: test_show_omits_empty_sections_assertion
    description: >
      The test for AC-18 (Water section omitted when no water metadata) initially
      checked `assert "Water" not in result.output`. This failed because the "Water
      weight:" field label legitimately contains "Water". Fixed to check section
      headings as standalone lines, which is the correct interpretation of AC-18.
    impact: none — the spec intention is fully satisfied

  - id: pyproject_build_backend
    description: >
      The architect specified build-backend = "setuptools.backends.legacy:build".
      The installed setuptools version does not support this backend path.
      Changed to the standard "setuptools.build_meta" which is the correct value
      for the same legacy build backend.
    impact: none
