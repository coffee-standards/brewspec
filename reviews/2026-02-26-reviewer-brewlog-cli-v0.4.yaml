  spec_compliance:
    CF-1:
      status: PASS
      note: >
        list_.py defines _get_overall_rating() (lines 32-50) that checks
        result_rating_overall first, then falls back to JSON parsing of
        result_ratings['overall'], then returns None. _has_any_rating() uses
        this helper for column-visibility detection (line 98). _render_table()
        calls _get_overall_rating() per row (line 155). Five tests in
        TestListLegacyRatingFallback cover: legacy row shows rating, legacy row
        does not show dash, modern row unaffected, null row shows dash, and
        JSON without 'overall' key shows dash. All five pass.

    CF-2:
      status: PASS
      note: >
        The update command's BREW_ID argument docstring reads "BREW_ID is
        optional; defaults to the last brew when omitted." (update.py lines
        93-95). The carry-forward required the phrase "defaults to the last
        brew" to appear in full. Verified via `brewlog update --help` and
        confirmed by TestUpdateHelpText tests (test_update_help_contains_last_brew
        and test_update_help_description_not_truncated), both passing.

    CF-3:
      status: PASS
      note: >
        delete.py docstring (lines 23-26) reads: "Note: brew IDs are permanent
        and are not reassigned after deletion. Gaps in the ID sequence are
        expected and normal behaviour." Verified via `brewlog delete --help`.
        TestDeleteIdGapNote::test_delete_help_mentions_permanent_ids checks for
        "permanent" or synonymous terms and passes. The note is in the command
        docstring (shown in --help), satisfying "help text or post-delete output"
        requirement.

    CF-4:
      status: PASS
      note: >
        list_.py fetches all filtered rows first (via db.list_brews_filtered),
        then calls _has_any_method(rows) and _has_any_rating(rows) over the
        complete result set before building the table (lines 108-109). Column
        headers are conditionally appended (lines 123-135). Eight tests in
        TestListColumnVisibility cover: method hidden when absent, method shown
        when present, rating hidden when absent, rating shown when present,
        always-visible columns, legacy rating column triggers visibility,
        mixed-row set, and empty DB. All pass.

    CF-5:
      status: PASS
      note: >
        export.py implements CSV via _rows_to_csv() (lines 24-49): flat dict
        per row, all DB columns as headers, nulls as empty strings, uses
        csv.DictWriter. validate_export_path() in serialise.py adds ".csv" to
        allowed_extensions only when fmt=="csv" (lines 177-178), so .csv without
        --format csv is rejected (exit 1). Overwrite protection and --force apply
        to CSV identically to YAML/JSON (lines 85-92). Thirteen tests in
        TestCsvExport cover: file created, header row present, required headers,
        one-row-per-brew, values match DB, nulls as empty string, .csv accepted
        with flag, .csv rejected without flag, empty DB, overwrite protection,
        --force, dotdot rejected, missing parent rejected, valid CSV parseable,
        success message, yaml/json regression, optional fields in CSV. All pass.
        Existing test_export_wrong_extension_rejected in test_cmd_export.py
        confirms .csv without --format csv still gives exit 1, preserving prior
        behavior.

    CF-6:
      status: PASS
      note: >
        pyproject.toml version = "0.4.0" (line 7). src/brewlog/__init__.py
        __version__ = "0.4.0" (line 3). cli.py reads __version__ for both the
        welcome screen (f"BrewLog v{__version__}") and the --version flag.
        TestVersionBump confirms both welcome screen and --version flag output
        "0.4.0". Both tests pass.

