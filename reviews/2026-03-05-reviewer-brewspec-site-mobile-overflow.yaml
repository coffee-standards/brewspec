      note: >
        Fix is technically correct. .code-block is a direct grid child of
        .examples-grid (display: grid; grid-template-columns: 1fr 1fr confirmed
        in Examples.astro lines 83-88). CSS Grid items default to min-width: auto,
        which sizes items to their content minimum and defeats the 1fr column
        constraint when a Shiki-rendered <pre> contains long lines. Setting
        min-width: 0 overrides that default, allowing the grid to clamp the item
        to its column allocation. The existing overflow-x: auto on
        .code-wrapper :global(pre) (CodeBlock.astro line 47) then takes effect,
        giving mobile users a horizontal scroll within the code box. This is the
        canonical, widely-documented fix for this class of CSS Grid overflow bug.
