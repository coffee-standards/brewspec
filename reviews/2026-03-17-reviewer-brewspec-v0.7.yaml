  critical_issues:
    - id: CRIT-1
      severity: Critical
      ac_refs: [AC-4]
      file: "/Users/scottluengen/Documents/1_Projects/brewspec/brewlog/src/brewlog/db.py"
      description: >
        _init_schema() DDL retains NOT NULL on the four previously-required fields: date,
        type, dose_g, water_weight_g. When a partial v0.7 brew document is imported (any of
        these fields absent), insert_brew_dict() passes None to the SQL INSERT and SQLite raises
        a NOT NULL constraint violation. The schema change makes these fields optional in
        BrewSpec, but the CLI storage layer does not honour that. No test in test_v07.py covers
        import of a partial brew — all import tests supply all four fields.
      fix: >
        1. Remove NOT NULL from date, type, dose_g, water_weight_g column definitions in
           _init_schema() DDL.
        2. Add date, type, dose_g, water_weight_g to _V7_MIGRATION_COLUMNS as nullable
           columns (ALTER TABLE ADD COLUMN without NOT NULL) so existing databases are
           upgraded correctly. Note: SQLite cannot alter an existing column's nullability —
           the migration must handle new DBs (DDL change) and existing DBs separately.
           For existing DBs the columns already exist but with NOT NULL — a table-rebuild
           migration is required or, simpler, accept that partial imports only work on
           fresh DBs in v0.7 and document the limitation. Discuss with orchestrator if
           the table-rebuild scope is too large for this version.
        3. Add null guards in serialise.row_to_brew_dict() for these four fields.
        4. Add a test: import a minimal v0.7 YAML with no date/type/dose_g/water_weight_g,
           confirm it stores and round-trips correctly.

    - id: HIGH-1
      severity: High
      ac_refs: [AC-6]
      file: "/Users/scottluengen/Documents/1_Projects/brewspec/brewspec-v0.7.md"
      description: >
        The Field Reference entry for result.yield_g omits the espresso dual-role note
        required by AC-6 and the product spec Design Notes. The note must explain: yield_g
        functions as both a recipe target (espresso process card) and a measured result;
        BrewSpec represents it solely as a result field; consuming tools
        may choose to store a target yield on their process card as an application-level
        concern outside BrewSpec's scope.
      fix: >
        Add a Notes column to the result.yield_g row in the Field Reference table (or a
        paragraph immediately after the table) with the dual-role explanation. Match the
        style of other field notes in the document.

