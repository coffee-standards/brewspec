  # --------------------------------------------------------------------------
  # Critical / High issues
  # --------------------------------------------------------------------------
  critical_issues: []

  # --------------------------------------------------------------------------
  # Security findings
  # --------------------------------------------------------------------------
  security:
    input_validation: >
      PASS — All user inputs go through Pydantic models (BrewInput, CoffeeInput,
      OriginInput, EquipmentInput, ResultInput, RatingsInput) before DB writes.
      Flag-level pre-validation in add.py and update.py catches empty strings and
      out-of-range numerics before Pydantic is invoked. The --db PATH flag is validated
      via validate_db_path() before any DB connection is opened.
    sql_injection: >
      PASS — All SQL in db.py uses parameterised ? placeholders. search_brews() wraps
      the user query as f'%{query}%' into a parameter list — the query value is never
      concatenated into the SQL string. The update_brew() SET clause is built from
      UPDATABLE_COLUMNS-validated column names (static strings) with ? placeholders
      for values. No string formatting of user data into SQL statements anywhere.
    file_io: >
      PASS — Import path validated by validate_import_path() (rejects '..', enforces
      10MB limit, requires file to exist). Export path validated by validate_export_path()
      (rejects '..', requires parent directory, enforces extension allowlist). DB path
      validated by validate_db_path() (rejects '..', requires parent directory). All
      YAML parsing uses yaml.safe_load() — yaml.load() is not used anywhere.
    no_dangerous_functions: >
      PASS — No eval(), exec(), pickle, or subprocess calls anywhere in the implementation.
      json.loads() and json.dumps() used for origin data serialisation; safe for structured
      data. All file reads use Path.read_text() with explicit encoding.
    path_handling: >
      PASS — '..' component check uses 'in p.parts' which correctly handles both leading
      and embedded '..' components. Parent directory existence validated for both export
      and --db paths. Import path must exist (enforced by validate_import_path). No
      symlink dereferencing concerns for a local CLI tool.
    error_messages: >
      PASS — Error messages describe the problem without exposing internal paths, stack
      traces, or SQL. The v0.5 migration message includes the GitHub URL for user
      guidance, not internal system paths.
    updatable_columns_allowlist: >
      PASS — UPDATABLE_COLUMNS frozenset guards update_brew() against injection of
      arbitrary column names. Assertion enforced at the DB layer. All new v0.5/v0.6
      columns (brew_ratio, coffee_name, coffee_origins, equipment_grinder_setting,
      equipment_notes) are present in the allowlist.

  # --------------------------------------------------------------------------
  # Medium / Low issues
  # --------------------------------------------------------------------------
  medium_issues:
    - id: MED-1
      severity: Medium
      file: "/Users/scottluengen/Documents/1_Projects/brewspec/brewlog/tests/test_cmd_v05.py"
      description: >
        AC-50i has no dedicated test for the varietal round-trip through export and import.
        The export serialisation of varietal within coffee.origins is verified only by the
        manual check performed during this review; it is not covered by a test assertion.
        The import test (test_origin_import_reads_origins at line 1123) only checks country,
        not varietal. The show test (test_origin_single_show at line 1064) does implicitly
        confirm varietal appears in show output. The missing coverage is specifically:
        (1) export contains varietal within each origin object in the brews[].coffee.origins
        array, and (2) import reads varietal from each origin object into the coffee_origins
        JSON column.
      suggestion: >
        Add two tests to TestCoffeeOrigins: one that adds a brew with --origin-varietal,
        exports it, and asserts origins[0]['varietal'] in the exported doc; one that imports
        a file with varietal in origins and asserts it is stored in coffee_origins JSON.

    - id: MED-2
      severity: Low
      file: "/Users/scottluengen/Documents/1_Projects/brewspec/brewlog/src/brewlog/serialise.py"
      description: >
        The module docstring on row_to_brew_dict() at line 49 reads 'Convert a sqlite3.Row
        to a BrewSpec v0.5 brew dict.' — should read v0.6 (carry-forward from v0.4 review
        MED-4 which was addressed in v0.5 but the function docstring retains the old version).
      suggestion: >
        Update the row_to_brew_dict() docstring to 'BrewSpec v0.6 brew dict.'

  # --------------------------------------------------------------------------
  # TDD compliance
  # --------------------------------------------------------------------------
  tdd_compliance:
    tests_written_first: true
    all_acs_have_tests: true
    meaningful_assertions: true
    notes: >
      676 tests, all passing. Every AC group has dedicated test classes in test_cmd_v05.py
      with docstrings referencing the relevant AC numbers. Tests use tmp_path isolation for
      DB operations throughout. Error case coverage is thorough: zero/negative values,
      empty strings, missing IDs, path traversal, invalid brew types, all tested. The
      AC-50i gap (no dedicated varietal export/import test) is noted as MED-1 but the
      implementation is correct and the overall TDD posture is strong.

  # --------------------------------------------------------------------------
  # Summary
  # --------------------------------------------------------------------------
  summary: >
    BrewLog CLI v0.5 is a PASS. All 63 acceptance criteria (including AC-50a through
    AC-50i) are correctly implemented. The test suite passes 676 tests with zero failures.
    Ruff reports zero lint errors. Security review finds no issues: SQL is fully
    parameterised, inputs are validated via Pydantic, file I/O uses safe YAML loading,
    path traversal is rejected at both the CLI entry point and the DB layer, and the
    UPDATABLE_COLUMNS allowlist guards the dynamic UPDATE query. One medium item (MED-1):
    the AC-50i varietal round-trip has no dedicated test — the implementation is correct
    but the test gap leaves this path unverified by the suite. One low item (MED-2): a
    stale 'v0.5' in a module docstring. Neither is blocking. The implementation is ready
    to deploy.

  carry_forward:
    - "MED-1: Add dedicated tests for AC-50i varietal round-trip through export and import
      in test_cmd_v05.py TestCoffeeOrigins class."
    - "MED-2: Update row_to_brew_dict() docstring in serialise.py from 'BrewSpec v0.5
      brew dict' to 'BrewSpec v0.6 brew dict'."
