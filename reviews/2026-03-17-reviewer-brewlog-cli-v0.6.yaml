        and insert_brew_dict() both handle yield_g. show.py displays "Yield: {value}g".
        serialise.py serialises yield_g under result.yield_g. result_yield_g in
        UPDATABLE_COLUMNS. Full test coverage in test_v07.py and test_cmd_add/update.py.

    AC-3:
      status: PASS
      note: >
        import_.py rejects non-v0.7 documents with _V07_REQUIRED_MSG, exits 1.
        Message includes version found, migration step, and GitHub URL. Tested by
        test_import_v06_file_rejected_with_v07_message and
        test_import_exact_v07_rejection_message in test_v07.py. See MED-1 re: "BrewLog v0.7"
