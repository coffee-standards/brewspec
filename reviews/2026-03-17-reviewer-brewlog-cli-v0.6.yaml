    AC-5:
      status: PASS
      note: >
        row_to_brew_dict() docstring in serialise.py updated to "BrewSpec v0.7 brew dict".

  critical_issues: []

  security:
    input_validation: PASS — yield_g validated > 0 at CLI layer and Pydantic model layer.
    sql_injection: >
      PASS — result_yield_g added to parameterised INSERT tuples in insert_brew() and
      insert_brew_dict(). update.py routes yield_g through UPDATABLE_COLUMNS-gated
      update_brew(). No string formatting of user data into SQL.
    file_io: PASS — yaml.safe_load() used exclusively. No new file I/O paths introduced.
    no_dangerous_functions: PASS — No eval(), exec(), pickle, or subprocess calls.
    error_messages: >
      PASS — No sensitive data exposed. NOTE: the import rejection message says "BrewLog v0.7"
      when the package version is 0.6.0 — factually incorrect but not a security issue.
      See MED-1.

  medium_issues:
    - id: MED-1
      severity: Medium
      file: "brewspec/brewlog/src/brewlog/commands/import_.py"
      description: >
        _V07_REQUIRED_MSG says "not supported by BrewLog v0.7" / "BrewLog v0.7 requires
        BrewSpec v0.7", but the BrewLog package is v0.6.0. A user running v0.6.0 sees
        "BrewLog v0.7" in the error, which contradicts the version they installed.
        test_import_exact_v07_rejection_message in test_v07.py also encodes the incorrect
        version in its expected string.
      suggestion: >
        In import_.py, replace "BrewLog v0.7" with a version-agnostic phrase such as
        "this version of BrewLog", or import __version__ and use it dynamically.
        Update the expected string in the corresponding test to match.

    - id: MED-2
      severity: Low
      file: "brewspec/brewlog/src/brewlog/commands/import_.py"
      description: >
        The manifest task description specified the exact rejection message as a one-liner:
        'File uses BrewSpec v0.6. Update brewspec_version to "0.7" — no other changes
        required.' The actual message is verbose multi-line. Non-blocking — the verbose
        message is better UX. No fix required unless the spec wording is preferred.

  tdd_compliance:
    all_acs_have_tests: true
    meaningful_assertions: true
    notes: >
      test_v07.py contains 27 tests covering ResultInput.yield_g validation, DB migration
      (new and existing DB, idempotency), import with/without yield_g, export
      with/without yield_g, round-trip, show display, and version rejection. CLI-level
      tests in test_cmd_add.py and test_cmd_update.py cover --yield-g storage, zero/negative
      rejection, show display, and export. MED-1 carry-forward tests in test_cmd_v05.py
      TestCoffeeOrigins are present and meaningful.

  summary: >
    PASS. All five manifest task items correctly implemented. Schema version "0.7" consistent
    throughout. result.yield_g support is complete (flag, validation, DB migration, insert,
    update, show, export, import). Import correctly rejects v0.6 documents with actionable
    guidance. Both v0.5 carry-forward items resolved (MED-1 varietal round-trip tests,
    MED-2 docstring). The DB migration also resolves CRIT-1 from the BrewSpec v0.7 review
    (NOT NULL rebuild for legacy DBs). 711/711 tests passing, ruff clean.
    Two carry-forward items for the next BrewLog version: MED-1 (import error message
    says "BrewLog v0.7" — should be version-agnostic); MED-2 (message wording diverges
    from manifest spec text, non-blocking).

  carry_forward:
