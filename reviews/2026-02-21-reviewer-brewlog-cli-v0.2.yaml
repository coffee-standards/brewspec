security_findings:

  - area: SQL injection — delete
    status: CLEAN
    notes: >
      DELETE FROM brews WHERE id = ? with (brew_id,) tuple. No string
      interpolation. brew_id validated as positive integer before DB access.

  - area: SQL injection — list filter (dynamic WHERE)
    status: CLEAN
    notes: >
      Condition strings are compile-time literals ("type = ?", "rating = ?",
      "date >= ?"). User-supplied values are collected in a separate params list
      and passed as the second argument to conn.execute(). No user input is ever
      interpolated into the SQL string. Injection is structurally impossible.

  - area: Input validation — filter flags
    status: CLEAN
    notes: >
      All three filter values validated before reaching DB layer: --type against
      BREW_TYPE_ENUM set, --rating as 1-5 integer, --since as parseable
      YYYY-MM-DD. Invalid values exit 1 before any SQL is executed.

  - area: Input validation — add flag parity
    status: CLEAN
    notes: >
      --ey validated as float > 0 by Pydantic model. --grinder and --brewer
      validated as non-empty by EquipmentInput minLength constraint. Consistent
      with update command behaviour.

  - area: No secrets
    status: CLEAN
    notes: No API keys, credentials, or tokens in source or test fixtures.

  - area: Path traversal
    status: CLEAN
    notes: Existing .. rejection in serialise.py unchanged and verified passing.

blocking_issues: []

recommendations:
  - >
    For future versions: the update command's column names in update_brew() are
    passed as dict keys from application code (not user input), so the f-string
    in that function is safe — but consider adding a column allowlist assertion
    as defence-in-depth.
  - >
    Consider adding a --rating-min/--rating-max range filter to list in a future
    version to complement the current exact-match rating filter.
