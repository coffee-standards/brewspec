  security:
    input_validation: >
      PASS — All new fields validated via Pydantic before DB write: brew_ratio uses
      float with > 0 check; grinder_setting and equipment.notes use string validators
      with minLength/maxLength; origins uses list[OriginInput] with per-field
      validators; harvest_year validated as int in range 1900-2100. Schema validation
      (Draft202012Validator) runs before any insert on import. The add command builds
      OriginInput objects from --origin flag strings before writing.

    sql_injection: >
      PASS — All SQL uses parameterised ? placeholders. No user-controlled values
      appear in SQL string construction. The update_brew() f-string column name
      interpolation is safe: column names come from the UPDATABLE_COLUMNS allowlist
      (a frozenset in application code, not user input), and an assertion enforces
      this. insert_brew and insert_brew_dict both use fully parameterised INSERT
      statements. New columns (brew_ratio, coffee_origins, equipment_grinder_setting,
      equipment_notes) are correctly included in parameterised parameter tuples.

    file_io: >
      PASS — yaml.safe_load() used for all YAML parsing. JSON uses json.loads().
      Import path validated via validate_import_path() before file open: rejects
      '..' components and files over 10MB. Export path validated via
      validate_export_path(): rejects '..', validates extension, checks parent
      directory exists.

    no_dangerous_functions: >
      PASS — No eval(), exec(), or pickle on user data. coffee_origins stored and
      retrieved as JSON (json.dumps / json.loads). String fields stored and displayed
      as plain text only. show.py displays origins by reading origin dicts
      and extracting known keys (name or country); no execution or interpolation.

    error_messages: >
      PASS — Error messages do not expose internal paths or stack traces. Pydantic
      ValidationError messages expose field names and constraint descriptions, which
      is appropriate. Import validation errors list schema constraint violations
      without exposing file paths or internal state.

    additional_properties: >
      PASS — additionalProperties: false is enforced on all new objects: the origin
      $def (confirmed by test_coffee_origins_unrecognised_field_rejected) and the
      equipment object with its four fields (confirmed by
      test_equipment_unrecognised_field_rejected). The coffee object continues to
      enforce this, ensuring coffee.origin is rejected (AC-17).

    string_limits: >
      PASS — maxLength: 100 on all new short string fields (grinder_setting, and
      all origin string fields). maxLength: 2000 on equipment.notes. All constraints
      tested in schema test suite and enforced in Pydantic models.

