  # ---
  # 4. SECURITY FINDINGS
  # ---
  security:
    overall: PASS
    findings:
      input_validation:
        status: PASS
        notes: >
          All new fields validated via JSON Schema before use. exclusiveMinimum: 0
          on dose_g, water_weight_g, water_volume_ml, duration_s, tds. minimum: 0
          on water.ppm (zero is valid for pure water — correct). Pattern constraint
          on roast_date (^\d{4}-\d{2}-\d{2}$) enforces structure. coffee.type and
          brew.type are enums. coffee.origin items enforce minLength: 1.
          additionalProperties: false on all four objects (root, brew, coffee, water)
          prevents injection of unexpected fields.

      safe_yaml_parsing:
        status: PASS
        notes: >
          tests/test_brewspec_schema.py load_example_file() (line 635): uses
          yaml.safe_load() exclusively. yaml.load() is not present anywhere in the
          test file. Verified by manual grep and automated edge case check. This
          is unchanged from v0.1 and correctly maintained through the v0.2 update.

      sql_injection:
        status: N/A
        notes: >
          No SQL in this deliverable. Schema-only task.

      freeform_text_safety:
        status: PASS
        notes: >
          coffee.varietal, coffee.process, coffee.origin items, notes, method, grind
          are all freeform strings. Schema enforces string type and minLength: 1 but
          no maxLength. No eval(), exec(), or shell usage anywhere. The spec document
          correctly notes these are plain text; tool builders are responsible for
          HTML escaping. Security spec requirement states this is an application-layer
          concern — correctly deferred.

      no_secrets:
        status: PASS
        notes: >
          No credentials, API keys, authentication tokens, or PII in any example file.
          Example values (Ethiopia, Colombia, Heirloom, Washed) are public geographic
          names and industry terminology.

      path_handling:
        status: PASS
        notes: >
          Test paths are derived from Path(__file__).parent.parent — not user-supplied.
          No user-facing file I/O in this deliverable. Path safety for import/export
          is deferred to BrewLog CLI.

      additional_properties:
        status: PASS
        notes: >
          additionalProperties: false enforced on root object, brew object, coffee
          object, and water object. Unknown fields are rejected. This is verified
          by test_additional_properties_rejected and the v0.1_format rejection tests.

      roast_date_calendar_validation:
        status: PASS
        notes: >
          Security spec correctly notes that the ^\\d{4}-\\d{2}-\\d{2}$ pattern does
          not validate calendar correctness (month 13, day 32 would pass the regex).
          This is documented in the product spec Security Requirements section and
          the design. No additional schema constraint is needed — calendar validation
          belongs at the application layer. The spec document and design both document
          this limitation.

    low_concern:
      - >
        coffee.origin items have no maxLength. The product spec security requirements
        note this is intentional and deferred to the application layer. If BrewLog CLI
        does not enforce a limit, pathologically long strings in origin, varietal, and
        process fields could cause memory issues on import. Should be addressed in
        BrewLog CLI implementation.
      - >
        tds and ppm have no maximum constraint. tds: 9999 is schema-valid. Security
        spec correctly documents this; application-layer display sanity limits are
        recommended. Not a schema-level deficiency.

