  medium_issues:
    - id: MED-1
      severity: Medium
      file: "/Users/scottluengen/Documents/1_Projects/brewspec/brewlog/src/brewlog/commands/list_.py"
      description: >
        _format_row() (line 61) reads only from result_rating_overall for
        the Overall Rating column. There is no fallback to the legacy
        result_ratings JSON column for v0.2 rows that may have had ratings
        stored as JSON. AC-38 states: "It continues to display the value
        stored in result_rating_overall (or the legacy rating column for
        pre-v0.3 brews)." The design (ADR-1) chose to deprecate the flat
        rating column and use result_rating_overall exclusively, but the
        result_ratings JSON column (used by v0.2) is not the same as the
        flat rating column — it stored a structured JSON object. show.py
        correctly implements the fallback (lines 116-123). The list command
        is inconsistent with show in this respect. For the v0.2 case this
        means existing brews with JSON-encoded ratings in result_ratings
        display "-" in the list rating column even though show displays
        the legacy rating.
      suggestion: >
        In _format_row(), after checking result_rating_overall for None,
        add a fallback that parses row["result_ratings"] JSON (if non-null)
        and reads the "overall" key as a fallback display value. This matches
        the show.py behaviour and makes list consistent with show for legacy
        v0.2 rows.

