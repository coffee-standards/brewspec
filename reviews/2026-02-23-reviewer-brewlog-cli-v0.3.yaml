  security:
    input_validation: >
      PASS — All new --rating-* flags (1-5 INTEGER) validated via Pydantic
      RatingsInput model before any DB write. --brix validated as >= 0 float.
      --tasting-notes validated as non-empty string. --grind validated against
      GRIND_ENUM frozenset. --date validated against DATE_PATTERN regex. --rating-min
      and --rating-max validated as integers 1-5 before query construction.
      No user input reaches the DB layer without validation.
    sql_injection: >
      PASS — All queries use parameterised ? placeholders throughout db.py.
      Column names in update_brew() come from the UPDATABLE_COLUMNS allowlist
      in application code, not from user input; assertion enforced at runtime.
      The dynamic WHERE clause in list_brews_filtered() builds condition
      strings from static source-code literals; only values are parameterised.
      No string interpolation of user-supplied values anywhere in the DB layer.
    file_io: >
      PASS — Export path validated before DB access: '..' rejection,
      extension allowlist (.yaml, .yml, .json), parent-directory existence
      check. Import path validated: '..' rejection, existence check, 10MB
      size limit before parsing. YAML parsed with yaml.safe_load() only;
      yaml.load() is prohibited. Imported data validated against v0.4 JSON
      Schema before any DB writes.
    no_dangerous_functions: >
      PASS — No eval(), exec(), pickle, or yaml.load() used anywhere.
      json.loads() and yaml.safe_load() are the only deserialisation
      functions used. No subprocess calls. No dynamic code execution.
    error_messages: >
      PASS — Error messages reference user-supplied values (brew IDs, flag
      names, file paths from user input) but do not expose internal stack
      traces, DB paths, or system paths to users. sys.exit(1) used
      consistently for error exits.
    path_handling: >
      PASS — validate_export_path() and validate_import_path() in serialise.py
      reject '..' in path parts before any file system operations. Parent
      directory existence checked before writing. No symlink traversal or
      path normalisation edge cases introduced in v0.3.

