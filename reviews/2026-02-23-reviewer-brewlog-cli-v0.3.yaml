  critical_issues:
    - id: HIGH-1
      severity: High
      ac_refs:
        - AC-13
      file: "/Users/scottluengen/Documents/1_Projects/brewspec/brewlog/src/brewlog/commands/import_.py"
      description: >
        The v0.3 import rejection message (_V04_REQUIRED_MSG, lines 21-29)
        does not match the verbatim content mandated by the product spec
        Design Notes (specs/products/brewlog-cli-v0.3.md, lines 408-427).
        The spec explicitly defines the exact message in the "v0.3 Import
        Rejection Message" design note, and the Success Metrics section
        states the requirement is "the exact error message defined in Design
        Notes."

        Differences between the required message and the actual implementation:

        1. Missing "Error: " prefix on line 1. The spec requires the message
           to begin with "Error: This file uses BrewSpec v0.3, ..."
           The implementation emits no prefix.

        2. CLI version not named. The spec requires "BrewLog v0.3 requires
           BrewSpec v0.4." The implementation says "BrewLog requires BrewSpec
           v0.4." without naming the version.

        3. Missing blank line. The spec has a blank line between the two
           intro sentences and the numbered migration list. The implementation
           has no blank line.

        4. Bullet list instead of numbered list. The spec specifies five
           numbered steps (1. 2. 3. 4. 5.). The implementation uses three
           bullet points (-).

        5. Step 1 (change brewspec_version key from "0.3" to "0.4") is
           entirely absent from the implementation.

        6. Steps 2 and 3 are combined into one bullet. The spec requires
           separate steps for tds and ey.

        7. The grind step omits "(or remove the 'grind' field if no match
           applies)" note required by the spec.

        8. Footer wording differs: spec requires "Full migration guide:"
           followed by the URL on the next line. Implementation uses
           "For full migration instructions, see:" with the URL on the
           next line.

        The existing tests (test_import_v03_file_states_version_found,
        test_import_v03_file_mentions_not_supported,
        test_import_v03_file_lists_migration_changes,
        test_import_v03_file_points_to_migration_guide) check only loose
        substrings and pass despite the mismatch. New tests with exact
        content assertions are needed.

      fix: >
        1. Replace the _V04_REQUIRED_MSG constant in
           commands/import_.py with the exact verbatim content from the
           spec Design Notes, reproduced here:

           Error: This file uses BrewSpec v{version}, which is not
           supported by BrewLog v0.3.
           BrewLog v0.3 requires BrewSpec v0.4.

           To migrate your file from v{version} to v0.4, make the
           following changes:
             1. Change 'brewspec_version' from "{version}" to "0.4"
             2. Move 'tds' (if present) from the brew level to 'result.tds'
             3. Move 'ey' (if present) from the brew level to 'result.ey'
             4. Move 'rating' (if present) from the brew level to
                'result.ratings.overall'
             5. Replace any freeform 'grind' values with one of:
                turkish, espresso, fine, medium_fine, medium, medium_coarse,
                coarse
                (or remove the 'grind' field if no match applies)

           Full migration guide: https://github.com/coffee-standards/brewspec

           Note: the spec hardcodes "v0.3" in the message. If the spec
           intent is that the message should name the CLI version (not the
           file version), use the literal string "v0.3". The {version}
           template already handles the file version in the first sentence.

        2. Update the test assertions in test_cmd_import.py to check the
           exact verbatim message content rather than loose substrings.
           At minimum add assertions for: "Error: " prefix, numbered list
           format (check "1." and "5." in output), "Full migration guide:"
           footer, and the blank-line separator.

