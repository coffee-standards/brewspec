        test_coffee_origin_item_maxlength_boundary PASSED.
    AC-20:
      description: "All 6 existing valid examples updated to brewspec_version: '0.3'"
      status: PASS
      evidence: >
        All 6 files verified: pour_over.yaml, pour_over.json, espresso.yaml,
        multi_brew.yaml, immersion_minimal.yaml, hybrid.yaml.
        test_valid_examples_pass (6 parametrized variants) all PASSED.
    AC-21:
      description: "At least one example has equipment with both grinder and brewer"
      status: PASS
      evidence: >
        pour_over.yaml lines 24-26: equipment with grinder: "Comandante C40 MK4",
