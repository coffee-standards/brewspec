        Coffee Object (5 fields with maxLength), Water Object, Equipment Object.
    AC-27:
      description: "brewspec-v0.3.md contains 'What Changed in v0.3' section"
      status: PASS
      evidence: >
        brewspec-v0.3.md lines 9-50: What Changed in v0.3 section.
        Documents: carry-forward docstring fixes, equipment object, ey field,
        maxLength constraints (all 8 fields listed), version bump.
    AC-28:
      description: "brewspec-v0.3.md contains Design Decisions section with 4 entries"
      status: PASS
      evidence: >
        brewspec-v0.3.md lines 186-209: Design Decisions section with four entries:
        why equipment as object, why freeform strings, why ey flat, why maxLength values.
    AC-29:
      description: "brewspec-v0.3.md contains Backward Compatibility section"
      status: PASS
      evidence: >
        brewspec-v0.3.md lines 213-247: Backward Compatibility section with impact table,
        maxLength guidance, version selection guidance, 3-step migration instructions.
    AC-30:
      description: "Test suite covers all new v0.3 constraints with boundary tests"
      status: PASS
      evidence: >
        All 16 new test functions from design Section 6.4 present and PASSED.
        test_version_const_rejects_v0_2 also added. Boundary conditions covered:
        100/101 chars for all maxLength fields, 0/-1/20.1 for ey.

  backward_compatibility:
    status: PASS
    findings:
      - >
        v0.2 documents with brewspec_version: "0.2" correctly rejected by v0.3 schema.
        test_version_const_rejects_v0_2 PASSED. This is the only intentional breaking change.
      - >
        Structurally, v0.2 brew content with realistic freeform field lengths passes
        v0.3 validation after version string update. All new fields (equipment, ey) optional.
        immersion_minimal.yaml confirms minimal v0.2-style content passes v0.3 schema.
      - >
        brewspec-v0.3.md Backward Compatibility section correctly documents version selection
        guidance and 3-step migration path.

  schema_correctness:
    status: PASS
    both_copies_in_sync: true
    files_verified:
      - /Users/scottluengen/Documents/1_Projects/coffee-brew-app/src/brewlog/brewspec.schema.json
      - /Users/scottluengen/Documents/1_Projects/coffee-brew-app/brewspec/spec/brewspec.schema.json
    all_diff_changes_verified: true
    schema_meta_validation: PASS
    meta_validation_evidence: >
      test_schema_is_valid_draft_2020_12 PASSED.
      Draft202012Validator.check_schema() passes; $schema assertion passes.

  security:
    input_validation:
      status: PASS
      detail: >
        All freeform string fields now have schema-enforced maxLength constraints.
        Closes unbounded-string concern from v0.1 and v0.2 reviews.
        Pydantic models mirror all schema constraints with field-specific validators.
    sql_injection:
      status: PASS
      detail: >
        All SQL in db.py uses ? parameterised placeholders. New ey, equipment_grinder,
        equipment_brewer columns inserted via params tuple. No string formatting in SQL.
    yaml_safe_load:
      status: PASS
      detail: >
        tests/test_brewspec_schema.py line 436: yaml.safe_load() in load_example_file().
        No yaml.load() calls in any source or test file.
    path_traversal:
      status: PASS
      detail: >
        validate_export_path and validate_import_path both check ".." in p.parts.
        10MB file size limit enforced before parsing. Unchanged from v0.1.
    additionalProperties_as_security_control:
      status: PASS
      detail: >
        additionalProperties: false on $defs.equipment (consistent with coffee, water, root).
        test_equipment_unknown_field_rejected confirms control is effective.
    no_eval_exec_pickle:
      status: PASS
      detail: >
        No eval(), exec(), pickle, or subprocess calls found anywhere in src/ or tests/.
        Equipment strings stored via parameterised SQL, displayed via click.echo() only.
    no_sensitive_data_in_examples:
      status: PASS
      detail: >
        All example equipment values are publicly available commercial product names.
        No PII, API keys, or credentials in any example file.

  tdd_compliance:
    status: PASS
    notes: >
      Backend-dev self-review documents TDD order: tests written first (FileNotFoundError
      on first run confirmed), then schema, then examples, then models. All 16 new test
      function names match design Section 6.4 exactly. Boundary conditions tested at both
      valid and invalid boundaries. No test asserts only True.
    coverage_gaps: none

  quality_observations:
    - id: Q1
      severity: Low
      description: >
        AC-13 (ey flat on brew object) is validated implicitly via test_ey_valid_value_accepted
        rather than an explicit assertion that ey is not nested. Constraint is enforced and passes;
        only test documentation clarity could be improved.
      file: /Users/scottluengen/Documents/1_Projects/coffee-brew-app/tests/test_brewspec_schema.py

    - id: Q2
      severity: Low
      description: >
        BrewInput.duration_s in models.py line 140 is typed Optional[int] while the JSON Schema
        defines duration_s as number (allowing floats). A float duration (e.g. 28.5) would be
        rejected by Pydantic but accepted by the schema. Not a v0.3 AC violation. Candidate for v0.4.
      file: /Users/scottluengen/Documents/1_Projects/coffee-brew-app/src/brewlog/models.py
      line: 140

    - id: Q3
      severity: Low
      description: >
        brewspec-v0.3.md Validation section does not include the implementation guidance from
        design Section 10.1 that tools should validate at storage time, not just at display time.
        Candidate for v0.4 spec document update.
      file: /Users/scottluengen/Documents/1_Projects/coffee-brew-app/brewspec/spec/brewspec-v0.3.md

    - id: Q4
      severity: Low
      description: >
        Carry-forward from CLI v0.1 review (Q1): show.py line 36 error message goes to stdout
        rather than stderr. Already tracked in brewlog-cli-v0.2 carry-forward. Noted for completeness.
      file: /Users/scottluengen/Documents/1_Projects/coffee-brew-app/src/brewlog/commands/show.py
      line: 36

  blocking_issues: none

  self_review:
    agent: reviewer
    task: "BrewSpec v0.3 review"
    scores:
