    # All required sub-sections present.

    scope_discipline: 3
    # No out-of-scope features added. The grind interactive prompt is explicitly
    # deferred with ADR-2 because it conflicts with the confirmed product spec scope
    # (optional fields remain flag-only). No new dependencies introduced.

    spec_traceability: 3
    # Every design element references specific ACs. ADR-1 resolves AC-22 open
    # question. ADR-2 resolves the grind menu conflict between key design areas
    # and product spec scope. Every file in the manifest traces to specific ACs.

    convention_compliance: 3
    # Parameterised SQL (? placeholders, no interpolation of user values).
    # Pydantic validation as primary + command-body validation as secondary layer.
    # Click CLI patterns consistent with baseline. frozenset for UPDATABLE_COLUMNS.
    # ruff check prescribed as final step in TDD order.

    downstream_handoff: 3
    # Each of the 14 change subsections specifies: exact function signatures,
    # complete SQL DDL, exact @click.option declarations, verbatim error messages,
    # exact code patterns for the before/after. The file manifest names every file
    # and operation. No implementation ambiguity remains.

    testability: 3
    # Section 6 enumerates named test functions grouped by AC with specific
    # inputs and expected outputs for every AC (42 ACs). Section 8 prescribes
    # the exact TDD sequence in 29 steps. Tests can be written directly from
    # the test strategy without referring back to the product spec.

    security: 3
    # Trust boundary diagram present for both CLI and import paths.
    # UPDATABLE_COLUMNS assertion fully specified (AC-1, AC-34).
    # New SQL conditions are static strings with ? placeholders — injection
    # analysis explicit. Import version-check message safety addressed
    # (user-supplied version string used for display only, not executed).
    # Invalid grind export warning goes to stderr only.

  weighted_score: 1.0
