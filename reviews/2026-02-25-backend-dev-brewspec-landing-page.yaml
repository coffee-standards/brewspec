  contrast_note: >
    AC-5 required verifying #C47B2B on #F7F5F2 contrast. Computed ratio: 3.10:1.
    This passes WCAG AA for large text (>= 18pt or >= 14pt bold) and for non-text
    elements (3:1 threshold). It does not pass AA for small text (4.5:1 threshold).
    Mitigated by using the accent only on borders (color-border is #E2DED9, not accent),
    the nav wordmark (large bold text), and decorative borders. The accent is not used
    as a text colour on any body-size copy. All body text uses #1A1814 on #F7F5F2 at
    16.29:1 — well above AA.
