# BrewSpec Project Manifest
#
# This file is the coordination protocol between agents. Each agent reads it
# to find work assigned to them, and updates it to signal handoff to the next.
#
# Task lifecycle (maps to agent pipeline):
#
#   backlog          → Identified, not yet prioritized by strategist
#   ready_for_spec   → Strategist approved; product-manager writes product spec next
#   specifying       → product-manager writing product spec
#   ready_for_design → Spec complete; architect designs next
#   designing        → architect producing design artifacts
#   ready_for_dev    → Design complete; backend-dev builds next
#   building         → backend-dev implementing with TDD
#   ready_for_review → Implementation complete; reviewer validates next
#   reviewing        → reviewer running checks
#   done             → Shipped and verified
#
# Pipeline tier (optional field on each task — defaults to standard):
#   tier: standard   → Full pipeline: strategist → PM → architect → dev → reviewer → deploy
#   tier: express    → Abbreviated: dev → reviewer → deploy. Use only when every step is
#                      already fully described (carry-forward items, single-behaviour fixes).
#                      Gate: could a dev implement this from the manifest description alone,
#                      with zero ambiguity? If yes → express. If no → standard.
#   tier: discovery  → dev only; output may not ship. Promote to standard or discard.
#
# Task types (applies to both tasks: and maintenance: sections):
#   type: feature   → Spec-driven new functionality. Default if field absent.
#                     Lives in tasks:.
#   type: bug       → Defect or carry-forward fix from review or real use. Lives in maintenance:.
#                     Defaults to tier: express.
#   type: refactor  → Health-report-sourced structural improvement. Lives in maintenance:.
#   type: chore     → Operational or compliance work. Human-driven, no agent pipeline.
#                     Lives in tasks:.
#
# Rules:
#   - Only the assigned agent should move a task to the next status
#   - Set assigned_to when picking up work; clear it when handing off
#   - Record artifact paths so the next agent knows what to read
#   - Tasks at different stages progress in parallel
#
# Cross-repo dependencies:
#   When a downstream product needs a schema change,
#   file a task here with type: feature and a description of the requirement.
#   Evaluate on its merits as a spec improvement. The spec leads, products follow.

project:
  name: "BrewSpec"
  mission: "Make the coffee industry more sustainable by providing the data backbone that helps businesses and individuals operate better and make smarter decisions."
  description: >
    Two products: BrewSpec (open standard for describing brews) and BrewLog CLI
    (local brew tracker that proves the spec works). Free and open source forever.
    The spec is the trust anchor — commercial products built by others (or by us,
    separately) use BrewSpec as their data interchange format.
  start_date: "2026-02-14"
  repo: "github.com/coffee-standards/brewspec"

products:
  - name: "BrewSpec"
    status: "in_progress"
    description: "Open source standard for describing coffee brews (YAML/JSON). The trust anchor — free and open forever."
    spec: specs/products/brewspec.md
    current_version: "1.0"
  - name: "BrewLog CLI"
    status: "in_progress"
    description: "Local command-line brew tracker using the BrewSpec format. Proves the spec works end-to-end."
    spec: specs/products/brewlog.md
    current_version: "1.0"
  - name: "BrewSpec Site"
    status: "active"
    description: "Public landing page at brewspec.coffee — describes the spec, links to the repo and schema."

tasks:
  # ──────────────────────────────────────────────────────────────────────────
  # BrewSpec Schema
  # Open tasks first, then done (newest → oldest).
  # ──────────────────────────────────────────────────────────────────────────

  - id: brewspec-v1.0
    name: "BrewSpec v1.0"
    type: feature
    product: "BrewSpec"
    priority: P1
    tier: standard
    status: done
    assigned_to: null
    completed_date: "2026-03-30"
    review_verdict: PASS
    review_date: "2026-03-29"
    review: reviews/2026-03-29-reviewer-brewspec-v1.0.yaml
    tag: v1.0
    artifacts:
      spec: specs/products/brewspec-v1.0.md
      design: specs/designs/brewspec-v1.0.md
    review_carry_forward:
      - "LOW: tests/test_brewspec_schema.py lines 91 and 96 — stale test function names test_schema_title_is_v0_9 and test_version_must_be_0_9 (assertions are correct; names are stale)"
      - "LOW: brew.water_g schema description reads 'Recipe target water weight in grams.' — should read 'Recipe target water in grams.' per AC-2 (no validation impact)"
      - "LOW: examples/invalid/v0.2_format.yaml comment still references 'the v0.3 schema'"
    depends_on:
      - brewspec-v0.9
    description: >
      BrewSpec v1.0. Several breaking changes, making this a major version bump.

      1. Recipe vs result symmetry for water and yield.
         Rename brew.water_weight_g → brew.water_g (the _weight suffix is redundant
         given the _g unit). Add brew.yield_g as a recipe-level target (intended
         output weight — primarily useful for espresso dialling). Add result.water_g
         for actual water used (captures deviation from recipe target). result.yield_g
         already exists and is unchanged. Context (brew level = recipe intent,
         result level = actual measurement) is what distinguishes target from actual
         — field names are intentionally symmetric and clean.

      2. Standardise name field maxLength.
         coffee.name is currently maxLength: 150; origin.name is maxLength: 100.
         Both should be 100. Reduces coffee.name from 150 → 100 (breaking constraint
         tightening — documents with names 101-150 chars become invalid).

      3. Differentiate freetext notes fields.
         Rename brew.notes → brew.process_notes (breaking rename; same semantics —
         operational observations about preparation). Add coffee.cupping_notes
         (sensory notes on the coffee as a whole, e.g. from a bag description or
         pre-brew cupping). Add origin.cupping_notes (per-component sensory notes).
         Coexistence rule: for a single-origin coffee, origin.cupping_notes serves
         as the cupping note for the coffee (same pattern as origin.name). For blends,
         each component carries its own origin.cupping_notes and coffee.cupping_notes
         describes the blend as a whole. result.tasting_notes is unchanged.

      4. Equipment: add pressure and flow rate fields.
         Add equipment.pressure_bar (number, exclusiveMinimum: 0) — line pressure or
         lever pressure in bars; primarily relevant to espresso. Add
         equipment.flow_rate_ml_s (number, exclusiveMinimum: 0) — volumetric flow
         rate in ml/s; useful for espresso profiling and controlled pour-over.

      All note renames (brew.notes → brew.process_notes) and the water_weight_g →
      water_g rename are breaking. The maxLength tightening on coffee.name is also
      technically breaking. This is the right time to bundle them as v1.0.

  - id: brewlog-cli-v1.0
    name: "BrewLog CLI v1.0"
    type: feature
    product: "BrewLog CLI"
    priority: P1
    tier: standard
    status: done
    assigned_to: null
    completed_date: "2026-03-30"
    review_verdict: PASS
    review_date: "2026-03-30"
    review: reviews/2026-03-30-reviewer-brewlog-cli-v1.0.yaml
    tag: brewlog-v1.0
    review_carry_forward:
      - "LOW: brewlog/src/brewlog/schema.py lines 24 and 37 — stale docstrings say 'v0.4 schema' instead of 'v1.0 schema'. Cosmetic only."
      - "LOW: no explicit unit test asserting 'water_g' not in UPDATABLE_COLUMNS (AC-32 regression guard missing). Implementation is correct."
    artifacts:
      spec: specs/products/brewlog-cli-v1.0.md
      design: specs/designs/brewlog-cli-v1.0.md
    depends_on:
      - brewspec-v1.0
      - brewlog-cli-v0.8
    description: >
      BrewSpec v1.0 adoption. Substantial schema changes require updates across
      models, DB, CLI, and tests.

      Breaking field renames:
      - brew.water_weight_g → brew.water_g: rename DB column, Pydantic field,
        all CLI prompts/flags, import/export serialisation.
      - brew.notes → brew.process_notes: rename DB column, Pydantic field,
        all CLI prompts/flags, import/export serialisation.

      New fields:
      - brew.yield_g (recipe target yield): new DB column, Pydantic field,
        CLI --target-yield flag on add/update.
      - result.water_g (actual water used): new DB column, Pydantic field,
        CLI --actual-water flag on add/update.
      - coffee.cupping_notes: new DB column, Pydantic field, CLI flag.
      - origin.cupping_notes: new DB column, Pydantic field, CLI flag.
      - equipment.pressure_bar: new DB column, Pydantic field, CLI flag.
      - equipment.flow_rate_ml_s: new DB column, Pydantic field, CLI flag.

      maxLength change: coffee.name maxLength 150 → 100. Update Pydantic model.

      DB migration required for all new and renamed columns. Bump BREWSPEC_VERSION
      to 1.0. Bundle updated v1.0 schema. TDD.

  - id: brewspec-site-v1.0
    name: "BrewSpec Site — v1.0 Update"
    type: feature
    product: "BrewSpec"
    priority: P1
    tier: express
    status: backlog
    assigned_to: null
    depends_on:
      - brewspec-v1.0
      - brewlog-cli-v1.0
    description: >
      Update brewspec.coffee landing page for v1.0. Bump version references from
      0.9 to 1.0 in Hero eyebrow and schema link. Update Examples section YAML to
      demonstrate v1.0 features (brew.water_g, brew.process_notes, new equipment
      fields). Update WhatItCovers section to reflect new fields. Add v1.0 schema
      to site/public/schema/. Update product version to 1.0 in manifest products
      section.


maintenance:
  # Bugs, carry-forward fixes, and health-report refactors.
  # Items here are small and targeted — no product spec or design doc required.
  #
  # type: bug      → defect or usability fix; defaults to tier: express
  # type: refactor → structural improvement sourced from a health report
  # type: chore    → carry-forward cleanup items; human-driven
  #
  # Status flow: backlog → ready_for_dev → ready_for_review → ready_for_deploy → done

  # ──────────────────────────────────────────────────────────────────────────
  # Carry-forward chores (surfaced during archiving)
  # ──────────────────────────────────────────────────────────────────────────

  - id: carry-forward-test-coverage
    type: chore
    product: "BrewSpec"
    priority: P3
    tier: express
    status: done
    assigned_to: null
    completed_date: "2026-03-30"
    review_verdict: PASS
    review_date: "2026-03-30"
    review: reviews/2026-03-30-reviewer-carry-forward-test-coverage.yaml
    review_carry_forward:
      - "LOW: tests/test_brewspec_schema.py — legacy test functions at lines 91 (test_schema_title_is_v1_0) and 96 (test_version_must_be_1_0) are now dead code, shadowed by identically named functions at lines 2010 and 2015. Remove or consolidate the legacy section in a future cleanup pass."
    description: >
      Carry-forward test/schema hygiene items from archived reviews.

      1. (from brewspec-v0.8) examples/invalid/invalid_type_enum.yaml still has
         brewspec_version: "0.2" — bump to current version so it tests the intended
         failure (bad type enum) rather than version mismatch.

      2. (from brewspec-v1.0 review) tests/test_brewspec_schema.py lines 91 and 96 —
         stale test function names test_schema_title_is_v0_9 and
         test_version_must_be_0_9. Assertions are correct; only the names are stale.
         Rename to test_schema_title_is_v1_0 and test_version_must_be_1_0.

      3. (from brewspec-v1.0 review) brewspec.schema.json — brew.water_g description
         reads "Recipe target water weight in grams." should read
         "Recipe target water in grams." (no validation impact).

      4. (from brewspec-v1.0 review) examples/invalid/v0.2_format.yaml — comment
         still references "the v0.3 schema"; update to reference the current schema.

  - id: carry-forward-brewlog-v1.0
    type: chore
    product: "BrewLog CLI"
    priority: P3
    tier: express
    status: ready_for_dev
    assigned_to: null
    source_task: brewlog-cli-v1.0
    description: >
      Carry-forward items from brewlog-cli-v1.0 review (non-blocking, Low severity).

      1. brewlog/src/brewlog/schema.py lines 24 and 37 — stale docstrings say
         "BrewSpec v0.4 schema" in both the module docstring and the _load_schema()
         docstring. Update to reference "BrewSpec v1.0 schema".

      2. No regression guard test asserting `water_g` not in UPDATABLE_COLUMNS.
         AC-32 requires `water_g` to be a non-updatable required field (same as
         `dose_g`). The implementation is correct but the guard test is missing.
         Add a test in test_v10_migration.py or test_db.py:
         `assert "water_g" not in db.UPDATABLE_COLUMNS`.

  - id: carry-forward-code-cleanup
    type: chore
    product: "BrewLog CLI"
    priority: P3
    tier: express
    status: done
    assigned_to: null
    completed_date: "2026-03-30"
    review_verdict: PASS
    review_date: "2026-03-30"
    review: reviews/2026-03-30-reviewer-carry-forward-code-cleanup.yaml
    description: >
      Carry-forward code comment and CI cleanup items from archived reviews.

      1. (from brewspec-site-v0.8) deploy-site.yml CI workflow still references
         v0.4.json in jq patch step (lines 40-41) — update or remove.

      2. (from brewlog-cli-v0.7) _rebuild_brews_table in db.py does not include
         coffee_roaster/coffee_roast_level — correct by design but add a comment
         explaining v0.8+ columns are excluded because _apply_migrations adds them
         after rebuild.

      3. (from brewlog-cli-v0.7) test_v08.py checks result.output for stderr
         messages — add comment or set mix_stderr=True explicitly.

