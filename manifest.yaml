  - id: brewspec-result-dose-duration
    name: "BrewSpec — backport result.dose_g and result.duration_s"
    type: feature
    product: "BrewSpec"
    priority: P1
    tier: express
    status: done
    assigned_to: null
    completed_date: "2026-03-31"
    pr: https://github.com/coffee-standards/brewspec/pull/14
    depends_on:
