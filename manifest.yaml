  # Items here are small and targeted — no product spec or design doc required.
  #
  # type: bug      → defect or usability fix; defaults to tier: express
  # type: refactor → structural improvement sourced from a health report
  # type: chore    → carry-forward cleanup items; human-driven
  #
  # Status flow: backlog → ready_for_dev → ready_for_review → ready_for_deploy → done

  # ──────────────────────────────────────────────────────────────────────────
  # Health report findings — 2026-03-31
  # Source: reviews/2026-03-31-system-steward-health-report.yaml
  # ──────────────────────────────────────────────────────────────────────────

  - id: refactor-schema-id-canonical-url
    type: refactor
    product: "BrewSpec"
    priority: P2
    tier: standard
    status: done
    assigned_to: null
    completed_date: "2026-03-31"
    review_verdict: PASS
    review_date: "2026-03-31"
    review: reviews/2026-03-31-reviewer-refactor-schema-id-canonical-url.yaml
    source: health-report
    health_finding: DRIFT-1
    health_report: reviews/2026-03-31-system-steward-health-report.yaml
    pipeline: "steward → architect → dev → reviewer"
    url_decision: "https://brewspec.coffee/schema/v1.0.json (versioned, stable identity)"
    pr: https://github.com/coffee-standards/brewspec/pull/12
    artifacts:
      design: specs/designs/refactor-schema-id-canonical-url.md
    review_carry_forward:
      - "LOW: rename test_bundled_schema_is_v0_9 to test_bundled_schema_is_v1_0 in brewlog/tests/test_brewspec_schema.py and update its docstring (stale name, correct assertion — cosmetic only)."
      - "MEDIUM: 6 stale version-assertion tests in test_cmd_welcome.py, test_cmd_v04.py, test_cmd_v05.py assert '0.8.0' against the current v1.0.0 binary. Predate this refactor; should be updated or removed in the next maintenance pass."
    description: >
      The architecture principle (specs/arch/principles.md) states: "The canonical
      schema URL lives at brewspec.coffee/schema/. The JSON Schema $id references
      this URL." The deployed schema sets $id to the raw GitHub CDN URL
      (https://raw.githubusercontent.com/coffee-standards/brewspec/main/brewspec.schema.json)
      instead.

      Architect input required first: confirm the exact target URL path
      (brewspec.coffee/schema/brewspec.schema.json vs
      brewspec.coffee/schema/v1.0/brewspec.schema.json) and whether the schema
      file is already served at that path by the site. Both the $id update in
      brewspec.schema.json and the site serving the file at that path must land
      together — otherwise $id will reference a broken URL.

  - id: refactor-v10-migration-transaction
    type: refactor
    product: "BrewLog CLI"
    priority: P3
    tier: express
    status: done
    assigned_to: null
    completed_date: "2026-03-31"
    review_verdict: PASS
    review_date: "2026-03-31"
    review: reviews/2026-03-31-reviewer-maintenance-express.yaml
    pr: https://github.com/coffee-standards/brewspec/pull/13
    source: health-report
    health_finding: GAP-1
    health_report: reviews/2026-03-31-system-steward-health-report.yaml
    description: >
      The brewlog-cli-v1.0 design (section 2.5) requires the V10 migration to
      execute as a single transaction with one conn.commit() at the end.
      The implementation in _apply_migrations() (brewlog/src/brewlog/db.py) has
      two commit paths: an early conn.commit() at line 393 (early return when
      coffee_origin column is absent, before Steps A and B) and the normal commit
      at line 412. In a failure between the V10 DDL and the data coercion steps,
      DDL would already be committed while coercion remains incomplete.

      Fix: restructure _apply_migrations() so V10 DDL, Step A (grinder_setting
      coercion), and Step B (origin migration) all execute before a single
      conn.commit() call, regardless of whether coffee_origin is present.
      Add or update a test to verify transaction atomicity (failure mid-migration
      leaves the DB in the pre-migration state).

  - id: refactor-stale-test-names-brewlog
    type: refactor
    product: "BrewLog CLI"
    priority: P3
    tier: express
    status: done
    assigned_to: null
    completed_date: "2026-03-31"
    review_verdict: PASS
    review_date: "2026-03-31"
    review: reviews/2026-03-31-reviewer-maintenance-express.yaml
    pr: https://github.com/coffee-standards/brewspec/pull/13
    source: health-report
    health_finding: TEST-1
    health_report: reviews/2026-03-31-system-steward-health-report.yaml
    description: >
      Two test functions in brewlog/tests/test_brewspec_schema.py have names that
      contradict what they test. test_bundled_schema_is_v0_9 (line 60) asserts the
      schema title is "BrewSpec v1.0". test_version_must_be_0_9 (line 69) tests
      that brewspec_version must be "1.0". Both test v1.0 behaviour correctly but
      their names describe v0.9 expectations — a CI failure on these tests produces
      a misleading error message.

      Fix: rename test_bundled_schema_is_v0_9 → test_bundled_schema_is_v1_0 and
      test_version_must_be_0_9 → test_version_must_be_1_0. Two one-line changes.

