    product: "BrewSpec"
    priority: P1
    tier: standard
    status: done
    assigned_to: null
    completed_date: "2026-03-17"
    review_verdict: PASS
    review_date: "2026-03-17"
    review: reviews/2026-03-17-reviewer-brewspec-v0.7-r2.yaml
    tag: v0.7
    artifacts:
      spec: specs/products/brewspec-v0.7.md
      design: specs/designs/brewspec-v0.7.md
    description: >
      Two targeted changes to the BrewSpec schema.

      1. Add result.yield_g field. Espresso brewing distinguishes between water_weight_g
         (water in) and yield_g (liquid out). These diverge due to puck absorption
         (typically 2–4g). Add result.yield_g as an optional positive number
         (exclusiveMinimum: 0). This is additive and non-breaking.

      2. Remove required constraint from brew object. The four previously required brew
         object fields (date, type, dose_g, water_weight_g) become optional. This is a
         breaking change for validators but not for existing documents — all v0.6-valid
         documents remain valid under v0.7 with only a version bump.
    depends_on:
      - brewspec-v0.6

