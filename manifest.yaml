    review: reviews/2026-03-19-reviewer-brewspec-v0.8.yaml
    tag: v0.8
    artifacts:
      spec: specs/products/brewspec-v0.8.md
      design: specs/designs/brewspec-v0.8.md
    depends_on:
      - brewspec-v0.7
    description: >
      Four targeted additions to the BrewSpec schema.

      1. Add coffee.roaster field. Freeform string identifying who roasted the coffee
         (e.g. "Onyx", "Tim Wendelboe"). Critical for tracking and comparing across roasters.

      2. Add coffee.roast_level field. Enum: light, medium, dark. Widely used descriptor
         that affects grind and brew parameters.

      3. Add origin.elevation_masl field. Positive integer for growing altitude in meters
         above sea level. Common on specialty bags, correlates with density and flavour.

      4. Add multipleOf: 0.1 precision constraint to water_temp_c. Pragmatic data validation —
         no consumer thermometer measures beyond 0.1°C precision.

      All changes are additive and non-breaking.
    review_carry_forward:
      - "examples/invalid/invalid_type_enum.yaml still has brewspec_version: \"0.2\" — bump to current version so it tests the intended failure (bad type enum) rather than version mismatch"

  - id: brewspec-v0.7
