  - id: brewspec-v0.9
    name: "BrewSpec v0.9"
    type: feature
    product: "BrewSpec"
    priority: P1
    tier: standard
    status: done
    assigned_to: null
    completed_date: "2026-03-22"
    review_verdict: PASS
    review_date: "2026-03-21"
    review: reviews/2026-03-21-reviewer-brewspec-v0.9.yaml
    tag: v0.9
    artifacts:
      spec: specs/products/brewspec-v0.9.md
      design: specs/designs/brewspec-v0.9.md
      adr: specs/decisions/ADR-001-ratings-scale-cva-hedonic.md
    depends_on:
      - brewspec-v0.8
    description: >
      Align ratings with the SCA Coffee Value Assessment (CVA) standard
      (SCA-104, adopted 2024). Two breaking changes:

      1. Update minimum/maximum on all ratings fields from 1-5 to 1-9.
         The CVA uses a 9-point hedonic scale (1 = dislike extremely,
         9 = like extremely).

      2. Rename ratings.body → ratings.mouthfeel to match CVA terminology.

      Also:
      3. Update rating descriptions to reflect the 1-9 scale and CVA semantics.
      4. Update all valid/invalid examples that reference ratings.
      5. Update the spec document.

      Existing 1-5 values remain valid under the expanded 1-9 range. The
      body → mouthfeel rename is a breaking field change.

