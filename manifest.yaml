# BrewSpec Project Manifest
#
# This file is the coordination protocol between agents. Each agent reads it
# to find work assigned to them, and updates it to signal handoff to the next.
#
# Task lifecycle (maps to agent pipeline):
#
#   backlog          → Identified, not yet prioritized by strategist
#   ready_for_spec   → Strategist approved; product-manager writes product spec next
#   specifying       → product-manager writing product spec
#   ready_for_design → Spec complete; architect designs next
#   designing        → architect producing design artifacts
#   ready_for_dev    → Design complete; backend-dev builds next
#   building         → backend-dev implementing with TDD
#   ready_for_review → Implementation complete; reviewer validates next
#   reviewing        → reviewer running checks
#   done             → Shipped and verified
#
# Pipeline tier (optional field on each task — defaults to standard):
#   tier: standard   → Full pipeline: strategist → PM → architect → dev → reviewer → deploy
#   tier: express    → Abbreviated: dev → reviewer → deploy. Use only when every step is
#                      already fully described (carry-forward items, single-behaviour fixes).
#                      Gate: could a dev implement this from the manifest description alone,
#                      with zero ambiguity? If yes → express. If no → standard.
#   tier: discovery  → dev only; output may not ship. Promote to standard or discard.
#
# Task types (applies to both tasks: and maintenance: sections):
#   type: feature   → Spec-driven new functionality. Default if field absent.
#                     Lives in tasks:.
#   type: bug       → Defect or carry-forward fix from review or real use. Lives in maintenance:.
#                     Defaults to tier: express.
#   type: refactor  → Health-report-sourced structural improvement. Lives in maintenance:.
#   type: chore     → Operational or compliance work. Human-driven, no agent pipeline.
#                     Lives in tasks:.
#
# Rules:
#   - Only the assigned agent should move a task to the next status
#   - Set assigned_to when picking up work; clear it when handing off
#   - Record artifact paths so the next agent knows what to read
#   - Tasks at different stages progress in parallel
#
# Cross-repo dependencies:
#   When a downstream product needs a schema change,
#   file a task here with type: feature and a description of the requirement.
#   Evaluate on its merits as a spec improvement. The spec leads, products follow.

project:
  name: "BrewSpec"
  mission: "Make the coffee industry more sustainable by providing the data backbone that helps businesses and individuals operate better and make smarter decisions."
  description: >
    Two products: BrewSpec (open standard for describing brews) and BrewLog CLI
    (local brew tracker that proves the spec works). Free and open source forever.
    The spec is the trust anchor — commercial products built by others (or by us,
    separately) use BrewSpec as their data interchange format.
  start_date: "2026-02-14"
  repo: "github.com/coffee-standards/brewspec"

products:
  - name: "BrewSpec"
    status: "in_progress"
    description: "Open source standard for describing coffee brews (YAML/JSON). The trust anchor — free and open forever."
    spec: specs/products/brewspec.md
    current_version: "1.0"
  - name: "BrewLog CLI"
    status: "in_progress"
    description: "Local command-line brew tracker using the BrewSpec format. Proves the spec works end-to-end."
    spec: specs/products/brewlog.md
    current_version: "1.0"
  - name: "BrewSpec Site"
    status: "active"
    description: "Public landing page at brewspec.coffee — describes the spec, links to the repo and schema."

