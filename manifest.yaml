    description: >
      Backport result.dose_g and result.duration_s to the v1.0 schema, completing
      recipe/result field symmetry for all four core brew measurements. Both fields
      were present at the brew (recipe) level but absent from the result object.
      Additive, non-breaking. Updates all three schema copies (root, site, brewlog),
      adds 8 schema validation tests, updates espresso_full_symmetry.yaml example,
      updates ADR-002 symmetry table, and updates brewspec-v1.0.md.

  - id: brewlog-result-dose-duration
    name: "BrewLog CLI — adopt result.dose_g and result.duration_s"
    type: feature
    product: "BrewLog CLI"
    priority: P1
    tier: express
    status: done
    assigned_to: null
    completed_date: "2026-03-31"
    review_verdict: PASS
    review_date: "2026-03-31"
    review: reviews/2026-03-31-reviewer-brewlog-result-dose-duration.yaml
    pr: https://github.com/coffee-standards/brewspec/pull/15
    depends_on:
      - brewspec-result-dose-duration
      - brewlog-cli-v1.0
    description: >
      Adopt the two new result fields added in brewspec-result-dose-duration.

      New fields (both optional, number, exclusiveMinimum: 0):
      - result.dose_g: actual coffee dose used. CLI flag --actual-dose.
        DB column: result_dose_g. Pydantic field: dose_g on BrewResult model.
      - result.duration_s: actual extraction time in seconds. CLI flag: --actual-duration.
        DB column: result_duration_s. Pydantic field: duration_s on BrewResult model.

      Schema copy in brewlog/src/brewlog/brewspec.schema.json is already updated
      (done in brewspec-result-dose-duration). No migration complexity — additive
      columns only, nullable. Add DB migration step, Pydantic fields, CLI add/update
      flags, import/export serialisation, and tests. TDD.

