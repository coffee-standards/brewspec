    health_report: reviews/2026-03-31-system-steward-health-report.yaml
    description: >
      jsonschema 4.19.2 is installed; latest is 4.26.0 (7 minor versions behind).
      Versions 4.20–4.26 contain bug fixes and Draft 2020-12 compatibility
